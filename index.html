<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #f5f0e8; --dark: #1a1a1a; --warm: #c8a96e; --muted: #6b6560;
      --card-bg: #ffffff; --border: #e0d8cc; --checked-bg: #f9f6f0;
      --shadow: 0 2px 20px rgba(0,0,0,0.06); --green: #4caf7d;
    }
    body { background-color: var(--cream); color: var(--dark); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; }

    /* HEADER */
    header { background: var(--dark); color: var(--cream); padding: 3rem 2rem 2rem; text-align: center; position: relative; overflow: hidden; }
    header::before { content:''; position:absolute; inset:0; background: repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(200,169,110,0.04) 40px,rgba(200,169,110,0.04) 41px); }
    .header-label { font-size:0.7rem; font-weight:500; letter-spacing:0.25em; text-transform:uppercase; color:var(--warm); margin-bottom:0.75rem; }
    header h1 { font-family:'Playfair Display',serif; font-size:clamp(2rem,5vw,3.2rem); font-weight:400; line-height:1.1; position:relative; }
    header h1 em { font-style:italic; color:var(--warm); }
    .header-sub { margin-top:0.75rem; font-size:0.9rem; color:rgba(245,240,232,0.55); letter-spacing:0.03em; }

    /* SYNC STATUS BAR */
    .sync-bar { background: var(--dark); padding: 0 2rem 0.6rem; display:flex; align-items:center; justify-content:center; gap:0.5rem; }
    .sync-dot { width:7px; height:7px; border-radius:50%; background:#555; transition: background 0.4s; flex-shrink:0; }
    .sync-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .sync-dot.syncing { background: var(--warm); animation: pulse 1s infinite; }
    .sync-dot.error { background: #e07c5a; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .sync-label { font-size:0.7rem; color:rgba(245,240,232,0.45); letter-spacing:0.08em; }

    /* PROGRESS BAR */
    .progress-wrap { background: var(--dark); padding: 0 2rem 1.5rem; text-align:center; }
    .progress-bar-outer { max-width:480px; margin:0 auto; height:3px; background:rgba(255,255,255,0.1); border-radius:2px; overflow:hidden; }
    .progress-bar-inner { height:100%; background:var(--warm); border-radius:2px; transition:width 0.4s ease; width:0%; }
    .progress-text { font-size:0.78rem; color:rgba(245,240,232,0.45); margin-top:0.5rem; letter-spacing:0.05em; }

    /* LAYOUT */
    main { max-width:900px; margin:0 auto; padding:2.5rem 1.5rem 4rem; }
    .room { margin-bottom:2.5rem; animation:fadeUp 0.5s ease both; }
    .room:nth-child(1){animation-delay:0.05s} .room:nth-child(2){animation-delay:0.15s}
    .room:nth-child(3){animation-delay:0.25s} .room:nth-child(4){animation-delay:0.35s}
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

    .room-header { display:flex; align-items:center; gap:1rem; margin-bottom:1rem; }
    .room-icon { width:42px; height:42px; background:var(--dark); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.2rem; flex-shrink:0; }
    .room-title-wrap { flex:1; }
    .room-title { font-family:'Playfair Display',serif; font-size:1.35rem; font-weight:700; }
    .room-count { font-size:0.75rem; color:var(--muted); margin-top:2px; letter-spacing:0.04em; }
    .room-progress-pill { font-size:0.72rem; font-weight:500; color:var(--warm); background:rgba(200,169,110,0.12); border:1px solid rgba(200,169,110,0.3); padding:3px 10px; border-radius:20px; white-space:nowrap; }

    .card { background:var(--card-bg); border:1px solid var(--border); border-radius:14px; overflow:hidden; box-shadow:var(--shadow); }
    .category { border-bottom:1px solid var(--border); }
    .category:last-child { border-bottom:none; }
    .category-label { font-size:0.67rem; font-weight:500; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); padding:0.75rem 1.25rem 0.4rem; background:#fafaf8; border-bottom:1px solid var(--border); }

    .item { display:flex; align-items:center; gap:0.9rem; padding:0.7rem 1.25rem; border-bottom:1px solid #f0ece4; transition:background 0.15s; }
    .item:last-child { border-bottom:none; }
    .item:hover { background:#fdfcfa; }
    .item.checked { background:var(--checked-bg); }

    .checkbox { width:20px; height:20px; border:1.5px solid #ccc; border-radius:6px; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all 0.2s; background:white; cursor:pointer; }
    .item.checked .checkbox { background:var(--warm); border-color:var(--warm); }
    .checkbox svg { width:11px; height:11px; stroke:white; stroke-width:2.5; opacity:0; transition:opacity 0.2s; }
    .item.checked .checkbox svg { opacity:1; }

    .item-text { flex:1; cursor:pointer; }
    .item-name { font-size:0.9rem; color:var(--dark); transition:color 0.2s; }
    .item.checked .item-name { color:var(--muted); text-decoration:line-through; text-decoration-color:#bbb; }
    .item-note { font-size:0.73rem; color:#aaa; margin-top:1px; }

    .priority-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
    .priority-dot.high { background:#e07c5a; }
    .priority-dot.mid  { background:var(--warm); }
    .priority-dot.low  { background:#b0c4b1; }

    .exp-btn { font-size:0.7rem; font-weight:600; width:22px; height:22px; border-radius:6px; border:1.5px solid #ddd; background:transparent; color:#bbb; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.15s; padding:0; }
    .exp-btn:hover { border-color:var(--warm); color:var(--warm); }
    .exp-btn.has-exp { border-color:var(--warm); color:var(--warm); background:rgba(200,169,110,0.1); }

    .actions { display:flex; gap:0.75rem; justify-content:center; flex-wrap:wrap; margin-top:2.5rem; }
    .btn { font-family:'DM Sans',sans-serif; font-size:0.82rem; font-weight:500; letter-spacing:0.06em; padding:0.6rem 1.4rem; border-radius:8px; border:1.5px solid var(--dark); cursor:pointer; transition:all 0.2s; background:transparent; color:var(--dark); }
    .btn:hover { background:var(--dark); color:var(--cream); }
    .btn.primary { background:var(--dark); color:var(--cream); }
    .btn.primary:hover { background:#333; }

    .legend { display:flex; gap:1.25rem; justify-content:center; margin-top:2rem; flex-wrap:wrap; }
    .legend-item { display:flex; align-items:center; gap:0.4rem; font-size:0.73rem; color:var(--muted); }

    #save-toast { display:none; text-align:center; margin-top:1rem; font-size:0.78rem; color:var(--warm); letter-spacing:0.05em; }

    /* LOADING OVERLAY */
    #loading-screen { position:fixed; inset:0; background:var(--dark); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:2000; transition:opacity 0.4s; }
    #loading-screen.hidden { opacity:0; pointer-events:none; }
    .loading-title { font-family:'Playfair Display',serif; font-size:1.5rem; color:var(--cream); margin-bottom:1rem; }
    .loading-dots { display:flex; gap:6px; }
    .loading-dots span { width:8px; height:8px; border-radius:50%; background:var(--warm); animation:bounce 1.2s infinite; }
    .loading-dots span:nth-child(2){animation-delay:0.2s} .loading-dots span:nth-child(3){animation-delay:0.4s}
    @keyframes bounce { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }

    /* MODAL */
    #modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:1000; align-items:center; justify-content:center; padding:1rem; }
    .modal-box { background:white; border-radius:16px; padding:1.75rem; width:100%; max-width:420px; box-shadow:0 20px 60px rgba(0,0,0,0.2); }
    .modal-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:1.25rem; }
    .modal-eyebrow { font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
    #modal-title { font-family:'Playfair Display',serif; font-size:1.05rem; font-weight:700; max-width:300px; line-height:1.3; }
    .modal-close { background:none; border:none; font-size:1.3rem; color:#aaa; cursor:pointer; line-height:1; padding:2px 6px; }
    .modal-fields { display:grid; gap:0.75rem; }
    .field-label { font-size:0.72rem; color:var(--muted); letter-spacing:0.08em; text-transform:uppercase; display:block; margin-bottom:4px; }
    .field-input { width:100%; padding:0.55rem 0.75rem; border:1.5px solid var(--border); border-radius:8px; font-family:'DM Sans',sans-serif; font-size:0.9rem; outline:none; }
    .field-input:focus { border-color:var(--warm); }
    .modal-actions { display:flex; gap:0.6rem; margin-top:1.25rem; }
    .modal-cancel { flex:1; padding:0.6rem; border:1.5px solid var(--border); border-radius:8px; background:none; font-family:'DM Sans',sans-serif; font-size:0.85rem; cursor:pointer; color:var(--muted); }
    .modal-save { flex:2; padding:0.6rem; border:none; border-radius:8px; background:var(--dark); color:var(--cream); font-family:'DM Sans',sans-serif; font-size:0.85rem; font-weight:500; cursor:pointer; }

    @media(max-width:600px){ header{padding:2rem 1.25rem 1.75rem} main{padding:1.5rem 1rem 3rem} .item{padding:0.65rem 1rem} }
  </style>
</head>

<!-- LOADING SCREEN -->
<div id="loading-screen">

  <div class="loading-dots"><span></span><span></span><span></span></div>
</div>

<header>

</header>

<!-- SYNC STATUS -->

</div>

<!-- PROGRESS -->
<div class="progress-wrap">

  <div class="progress-text" id="globalText">Loading…</div>
</div>

<main id="app"></main>

<!-- EXPENSE MODAL -->
<div id="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <div>
        <div class="modal-eyebrow">Log Expense</div>
        <div id="modal-title"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-fields">
      <div>
        <label class="field-label">Price paid ($)</label>
        <input id="exp-price" class="field-input" type="number" step="0.01" placeholder="e.g. 49.99"/>
      </div>
      <div>
        <label class="field-label">Store / retailer</label>
        <input id="exp-store" class="field-input" type="text" placeholder="e.g. Williams Sonoma, Amazon"/>
      </div>
      <div>
        <label class="field-label">Purchase date</label>
        <input id="exp-date" class="field-input" type="date"/>
      </div>
      <div>
        <label class="field-label">Receipt / notes</label>
        <input id="exp-receipt" class="field-input" type="text" placeholder="e.g. Order #12345, receipt in email"/>
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-save" id="modal-save-btn">Save Expense</button>
    </div>
  </div>
</div>

// ── STATE ─────────────────────────────────────────────────────────────────────
let _state = {};
let _expenses = {};
let _isSyncing = false;
let _unsubscribe = null;

function setSyncStatus(status, label) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  dot.className = 'sync-dot ' + status;
  lbl.textContent = label;
}

// ── FIREBASE SYNC ─────────────────────────────────────────────────────────────
async function initSync() {
  setSyncStatus('syncing', 'Connecting…');
  try {
    // Load initial data
    const snap = await getDoc(STATE_DOC);
    if (snap.exists()) {
      const data = snap.data();
      _state = data.checklist || {};
      _expenses = data.expenses || {};
    }
    // Hide loading screen
    document.getElementById('loading-screen').classList.add('hidden');
    renderApp();
    setSyncStatus('connected', 'Live — syncing with your wife');

    // Subscribe to real-time updates
    _unsubscribe = onSnapshot(STATE_DOC, (snap) => {
      if (snap.exists() && !_isSyncing) {
        const data = snap.data();
        _state = data.checklist || {};
        _expenses = data.expenses || {};
        renderApp();
        setSyncStatus('connected', 'Live · updated just now');
        setTimeout(() => setSyncStatus('connected', 'Live — syncing with your wife'), 3000);
      }
    });
  } catch (err) {
    console.error(err);
    document.getElementById('loading-screen').classList.add('hidden');
    setSyncStatus('error', 'Offline — changes saved locally');
    renderApp();
  }
}

async function persistState() {
  _isSyncing = true;
  setSyncStatus('syncing', 'Saving…');
  try {
    await setDoc(STATE_DOC, {
      checklist: _state,
      expenses: _expenses,
      updatedAt: new Date().toISOString()
    });
    setSyncStatus('connected', 'Saved ✓');
    setTimeout(() => setSyncStatus('connected', 'Live — syncing with your wife'), 2000);
  } catch (err) {
    setSyncStatus('error', 'Save failed — check connection');
  } finally {
    _isSyncing = false;
  }
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function getCategoryOffset(room, targetCat) {
  let offset = 0;
  for (const cat of room.categories) {
    if (cat === targetCat) return offset;
    offset += cat.items.length;
  }
  return offset;
}

function flatIndex(room, item) {
  for (const cat of room.categories) {
    const idx = cat.items.indexOf(item);
    if (idx >= 0) return getCategoryOffset(room, cat) + idx;
  }
  return 0;
}

function getExpense(key) { return _expenses[key] || {}; }

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderApp() {
  const app = document.getElementById('app');
  app.innerHTML = rooms.map(room => {
    const allItems = room.categories.flatMap(c => c.items);
    const checkedCount = allItems.filter(item => _state[`${room.id}-${flatIndex(room, item)}`]).length;
    const pct = Math.round(checkedCount / allItems.length * 100);
    return `
      <section class="room" id="room-${room.id}">
        <div class="room-header">
          <div class="room-icon">${room.icon}</div>
          <div class="room-title-wrap">
            <div class="room-title">${room.title}</div>
            <div class="room-count">${checkedCount} of ${allItems.length} items</div>
          </div>
          <div class="room-progress-pill">${pct}%</div>
        </div>
        <div class="card">
          ${room.categories.map(cat => `
            <div class="category">
              <div class="category-label">${cat.label}</div>
              ${cat.items.map((item) => {
                const key = `${room.id}-${getCategoryOffset(room, cat) + cat.items.indexOf(item)}`;
                const checked = _state[key] || false;
                const exp = getExpense(key);
                const hasExp = exp.price || exp.store;
                return `
                  <div class="item ${checked ? 'checked' : ''}" data-key="${key}">
                    <div class="checkbox" onclick="toggleItem('${key}')">
                      <svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,8.5 11,1"/></svg>
                    </div>
                    <div class="item-text" onclick="toggleItem('${key}')">
                      <div class="item-name">${item.name}</div>
                      ${item.note ? `<div class="item-note">${item.note}</div>` : ''}
                      ${hasExp ? `<div class="item-note" style="color:var(--warm)">💰 ${exp.price ? '$'+exp.price : ''} ${exp.store ? '· '+exp.store : ''} ${exp.date ? '· '+exp.date : ''}</div>` : ''}
                    </div>
                    <button class="exp-btn ${hasExp ? 'has-exp' : ''}" onclick="openExpenseModal('${key}', ${JSON.stringify(item.name)})" title="Log expense">$</button>
                    <div class="priority-dot ${item.p}"></div>
                  </div>`;
              }).join('')}
            </div>`).join('')}
        </div>
      </section>`;
  }).join('');

  app.innerHTML += `
    <div class="legend">
      <div class="legend-item"><div class="priority-dot high"></div> Must-have</div>
      <div class="legend-item"><div class="priority-dot mid"></div> Nice to have</div>
      <div class="legend-item"><div class="priority-dot low"></div> Optional</div>
    </div>
    <div class="actions">
      <button class="btn" onclick="resetAll()">Reset All</button>
      <button class="btn primary" onclick="checkAll()">Check All</button>
    </div>
    <div id="save-toast"></div>`;

  updateGlobal();
}

function updateGlobal() {
  const total = rooms.reduce((s, r) => s + r.categories.reduce((a, c) => a + c.items.length, 0), 0);
  const checked = Object.values(_state).filter(Boolean).length;
  const pct = total ? Math.round(checked / total * 100) : 0;
  document.getElementById('globalBar').style.width = pct + '%';
  document.getElementById('globalText').textContent = `${checked} of ${total} items checked — ${pct}% complete`;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
window.toggleItem = function(key) {
  _state[key] = !_state[key];
  renderApp();
  persistState();
};

window.resetAll = function() {
  if (!confirm('Reset all checked items?')) return;
  _state = {};
  renderApp();
  persistState();
};

window.checkAll = function() {
  rooms.forEach(room => {
    let i = 0;
    room.categories.forEach(cat => cat.items.forEach(() => { _state[`${room.id}-${i}`] = true; i++; }));
  });
  renderApp();
  persistState();
};

window.openExpenseModal = function(key, itemName) {
  const exp = getExpense(key);
  document.getElementById('modal-overlay').style.display = 'flex';
  document.getElementById('modal-title').textContent = itemName;
  document.getElementById('exp-price').value = exp.price || '';
  document.getElementById('exp-store').value = exp.store || '';
  document.getElementById('exp-date').value = exp.date || '';
  document.getElementById('exp-receipt').value = exp.receiptNote || '';
  document.getElementById('modal-save-btn').onclick = () => {
    _expenses[key] = {
      price: document.getElementById('exp-price').value,
      store: document.getElementById('exp-store').value,
      date: document.getElementById('exp-date').value,
      receiptNote: document.getElementById('exp-receipt').value
    };
    document.getElementById('modal-overlay').style.display = 'none';
    renderApp();
    persistState();
  };
};

window.closeModal = function() {
  document.getElementById('modal-overlay').style.display = 'none';
};

// ── BOOT ──────────────────────────────────────────────────────────────────────
initSync();
</script>
